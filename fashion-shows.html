<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fashion Shows — LUXE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --black:#111;
  --white:#fff;
  --gold:#b5a264;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  font-family:'Inter',sans-serif;
  background:white;
  color:#111;
  line-height:1.6;
}

/* NAV */
header{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  background:rgba(255,255,255,0.95);
  border-bottom:1px solid #e0e0e0;
}

.nav{
  max-width:1600px;
  margin:auto;
  padding:25px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:32px;
  font-weight:700;
  letter-spacing:6px;
  text-transform:uppercase;
}

.logo a{ text-decoration:none; color:inherit; }

.nav-links{
  display:flex;
  gap:35px;
  font-size:11px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
}

.nav-links a{ text-decoration:none; color:#111; }
.nav-links a.active{ color:var(--gold); }

/* HERO */
.collection-header{
  position:relative;
  height:75vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:white;
  text-align:center;
}

.video-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.video-bg::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

.video-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.header-content{ position:relative; z-index:2; }
.header-content h4{ letter-spacing:4px; font-size:12px; margin-bottom:10px; color:var(--gold); text-transform:uppercase; }
.header-content h1{ font-family:'Playfair Display',serif; font-size:clamp(40px,8vw,80px); font-style:italic; font-weight:400; }

/* VIDEO GRID */
.grid-section{ padding:120px 5% 80px; }
.video-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

.video-card video{
  width:100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  background: #f4f4f4;
  cursor: pointer;
}

.card-info{ padding:20px 0; }
.card-info .house{ font-size:10px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin-bottom:5px; }
.card-info h3{ font-size:13px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
.card-info p{ font-size:11px; color:#999; }

@media(max-width:1000px){ .video-grid{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px){ .video-grid{ grid-template-columns:1fr; } }
</style>
</head>

<body>

<header>

      <a href="jewelry.html">Jewelry</a>
      <a href="fashion-shows.html" class="active">Shows</a>
    </nav>
    <div class="nav-links">
      <a href="#">Search</a>
      <a href="cart.html">Cart (0)</a>
    </div>
  </div>
</header>

<section class="collection-header">
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="C:\Users\Admin\Documents\Luxe\Luxe\Videos\0123.mp4" type="video/mp4">
    </video>
  </div>
  <div class="header-content">
    <h4>The Runway</h4>
    <h1>Fashion Shows</h1>
  </div>
</section>

<div class="grid-section">
  <div class="video-grid">

    <!-- Video 1 -->
    <div class="video-card">
      <video controls>
        <source src="C:\Users\Admin\Documents\Luxe\Luxe\Videos\0123.mp4" type="video/mp4">
      </video>
      <div class="card-info">
        <div class="house">Collection I</div>
        <h3>The Silk Era</h3>
      </div>
    </div>

    <!-- Video 2 -->
    <div class="video-card">
      <video controls>
        <source src="C:\Users\Admin\Documents\Luxe\Luxe\Videos\Left alone.mp4" type="video/mp4">
      </video>
      <div class="card-info">
        <div class="house">Collection II</div>
        <h3>Haute Couture</h3>
      </div>
    </div>

  </div>
</div>

</body>
</html>
